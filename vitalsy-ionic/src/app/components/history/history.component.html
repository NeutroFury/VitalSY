<ion-content [fullscreen]="true" class="bg-[#050505]">
  <div class="px-6 py-8 flex flex-col gap-6 min-h-full pb-32">
    
    <app-header [showBack]="true" [showGreeting]="false" title="Historial"></app-header>
    
    <!-- Lista de Registros -->
    @for (log of logs; track log.id; let i = $index) {
      <div 
        class="bg-zinc-900/60 backdrop-blur-md rounded-2xl p-5 border border-neon-green/10 hover:border-neon-green/30 transition-colors group relative overflow-hidden animate-fade-in-up"
        [style.animation-delay]="(i * 0.1) + 's'"
        style="opacity: 0;"
      >
        <!-- Encabezado de la tarjeta -->
        <div class="flex items-center justify-between mb-5">
          <div class="flex flex-col">
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400 mb-0.5">{{ log.date }}</span>
            <span class="text-xs font-black text-white italic uppercase tracking-wider">{{ log.type }}</span>
          </div>
          <span class="text-[10px] font-black uppercase tracking-widest text-zinc-300">{{ log.time }}</span>
        </div>

        <!-- Métricas (Glucosa y Carbohidratos) -->
        <div class="flex gap-4">
          <!-- Glucosa -->
          <div class="flex-1 flex items-center gap-3 bg-black/60 p-3 rounded-xl border border-zinc-800/50">
            <ion-icon name="water-outline" class="text-lg text-neon-green"></ion-icon>
            <div class="flex items-baseline gap-1">
              <span class="font-black text-white">{{ log.glucose }}</span>
              <span class="text-[8px] font-black uppercase text-neon-green/80">mg/dL</span>
            </div>
          </div>
          
          <!-- Carbohidratos -->
          <div class="flex-1 flex items-center gap-3 bg-black/60 p-3 rounded-xl border border-zinc-800/50">
            <ion-icon name="nutrition-outline" class="text-lg text-zinc-400"></ion-icon>
            <div class="flex items-baseline gap-1">
              <span class="font-black text-white">{{ log.carbs }}</span>
              <span class="text-[8px] font-black uppercase text-zinc-400">g</span>
            </div>
          </div>

          <!-- Botón de detalles (visible en hover) -->
          <button class="w-12 h-full rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center transition-all active:scale-95 text-zinc-400 hover:text-white">
            <ion-icon name="arrow-forward-outline"></ion-icon>
          </button>
        </div>

        <!-- Notas adicionales si existen -->
        @if (log.note) {
          <div class="mt-5 pt-4 border-t border-zinc-800/50">
            <p class="text-[10px] text-zinc-300 italic font-medium leading-relaxed m-0">
              " {{ log.note }} "
            </p>
          </div>
        }
      </div>
    }
  </div>

</ion-content>

<!-- Botón Flotante de Exportación Fijo al fondo -->
<div class="absolute bottom-6 left-6 right-6 z-50">
  <button class="w-full h-16 rounded-2xl flex items-center justify-center gap-3 text-sm font-black uppercase tracking-[0.2em] bg-neon-green text-black neon-glow active:scale-95 transition-transform shadow-2xl">
    <ion-icon name="download-outline" class="text-xl stroke-[3px]"></ion-icon>
    Exportar PDF de Reportes
  </button>
</div>
