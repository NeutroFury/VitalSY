<div class="min-h-svh flex flex-col items-center justify-center p-6 bg-[#050505]">
  <div class="w-full max-w-sm space-y-12 animate-fade-in-up">
    
    <!-- Logo y Título -->
    <div class="flex flex-col items-center gap-4">
      <div class="w-20 h-20 bg-neon-green rounded-[2.5rem] flex items-center justify-center neon-glow rotate-12 transition-transform hover:rotate-0 duration-500">
        <ion-icon name="pulse" class="text-[40px] text-black font-black"></ion-icon>
      </div>
      <h1 class="text-5xl font-black tracking-tighter text-white uppercase italic m-0">
        VITAL<span class="text-neon-green">SY</span>
      </h1>
      <p class="text-zinc-600 text-xs font-bold tracking-[0.2em] uppercase m-0 text-center">Gestión Inteligente de Diabetes</p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
      
      <div class="space-y-4">
        <!-- Input Email -->
        <div class="flex flex-col gap-1.5 w-full">
          <label class="text-zinc-500 text-[10px] ml-1 uppercase font-bold tracking-widest">Correo Electrónico</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="correo@ejemplo.com"
            required
            class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white placeholder:text-zinc-700 focus:outline-none focus:border-neon-green focus:bg-zinc-800 transition-all text-sm w-full"
          />
        </div>

        <!-- Input Password -->
        <div class="flex flex-col gap-1.5 w-full">
          <label class="text-zinc-500 text-[10px] ml-1 uppercase font-bold tracking-widest">Contraseña</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            required
            class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white placeholder:text-zinc-700 focus:outline-none focus:border-neon-green focus:bg-zinc-800 transition-all text-sm w-full"
          />
        </div>
      </div>

      <!-- Botón Principal -->
      <button 
        type="submit" 
        [disabled]="!loginForm.valid"
        class="w-full h-16 text-base font-black bg-neon-green text-black uppercase tracking-wider rounded-2xl hover:opacity-90 active:scale-95 transition-all neon-glow disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Iniciar Sesión
      </button>

      <!-- Botones Secundarios -->
      <div class="flex flex-col items-center gap-6 pt-4">
        <div class="flex flex-col items-center gap-4 w-full">
          <button 
            type="button"
            (click)="goToSignup()"
            class="w-full h-14 text-xs font-black uppercase tracking-[0.2em] border border-zinc-900 text-zinc-400 rounded-xl hover:border-neon-green hover:text-white hover:bg-neon-green/10 active:scale-95 transition-all bg-transparent"
          >
            Crear cuenta
          </button>
          
          <button type="button" class="text-[10px] text-zinc-600 hover:text-neon-green transition-colors font-black uppercase tracking-widest underline underline-offset-4 bg-transparent border-none">
            ¿Olvidaste tu contraseña?
          </button>
        </div>
        
        <div class="flex items-center gap-4 text-[10px] text-zinc-800 font-black uppercase tracking-widest w-full">
          <div class="h-px flex-1 bg-zinc-900"></div>
          <span>O continúa con</span>
          <div class="h-px flex-1 bg-zinc-900"></div>
        </div>
        
        <div class="w-full">
          <button type="button" class="w-full h-12 text-[10px] font-black bg-zinc-900 text-white border border-zinc-800 rounded-xl hover:bg-zinc-800 active:scale-95 transition-all uppercase tracking-wider">
            GOOGLE
          </button>
        </div>
      </div>
    </form>

    <p class="text-center text-[10px] text-zinc-700 px-8 leading-relaxed uppercase tracking-[0.15em] font-bold">
      Al continuar, aceptas nuestros <span class="text-zinc-500">Términos</span> y <span class="text-zinc-500">Privacidad</span>.
    </p>
    
  </div>
</div>
