<ion-content [fullscreen]="true" class="bg-[#050505]">
  <div class="px-6 py-8 flex flex-col gap-6 min-h-full pb-32">
    
    <app-header [showBack]="true" [showGreeting]="false" title="Perfil"></app-header>
    
    <!-- Información Personal -->
    <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-0 mt-4">Información Personal</h3>
    <div class="bg-zinc-900/60 backdrop-blur-md rounded-2xl p-5 border border-neon-green/10 animate-fade-in-up" style="opacity: 0; animation-delay: 0s;">
      
      <div class="flex items-center gap-4 mb-4">
        <div class="p-3 bg-zinc-800 rounded-2xl flex items-center justify-center">
          <ion-icon name="person-outline" class="text-xl text-neon-green"></ion-icon>
        </div>
        <div class="w-full">
          <p class="text-[10px] font-black uppercase tracking-widest text-zinc-500 m-0">Nombre</p>
          <input type="text" [(ngModel)]="userName" class="bg-transparent text-lg font-black text-white italic outline-none w-full p-0 border-b border-transparent focus:border-neon-green transition-colors" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 pt-4 border-t border-zinc-800/50">
        <div class="space-y-1">
          <div class="flex items-center gap-2 text-zinc-500">
            <ion-icon name="person-outline" class="text-sm"></ion-icon>
            <span class="text-[9px] font-black uppercase tracking-wider">Edad</span>
          </div>
          <input type="number" [(ngModel)]="userAge" class="bg-transparent text-xl font-black text-white border-b border-zinc-800 focus:border-neon-green outline-none w-full py-1" />
        </div>
        <div class="space-y-1">
          <div class="flex items-center gap-2 text-zinc-500">
            <ion-icon name="fitness-outline" class="text-sm"></ion-icon>
            <span class="text-[9px] font-black uppercase tracking-wider">Peso (kg)</span>
          </div>
          <input type="number" [(ngModel)]="weightProgress" class="bg-transparent text-xl font-black text-white border-b border-zinc-800 focus:border-neon-green outline-none w-full py-1" />
        </div>
      </div>
      
      <div class="pt-4 mt-4 border-t border-zinc-800/50 space-y-1">
        <div class="flex items-center gap-2 text-zinc-500">
          <ion-icon name="fitness-outline" class="text-sm"></ion-icon>
          <span class="text-[9px] font-black uppercase tracking-wider">Dieta Actual</span>
        </div>
        <select [(ngModel)]="dietType" class="bg-zinc-900/50 text-sm font-black text-white p-3 rounded-xl w-full border border-zinc-800 outline-none focus:border-neon-green appearance-none mt-2">
          <option>Keto</option>
          <option>Low-Carb</option>
          <option>Estándar</option>
          <option>Vegana</option>
        </select>
      </div>

    </div>

    <!-- Vinculación con Abbott -->
    <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-0 mt-2">Integraciones Médicas</h3>
    <div class="bg-zinc-900/60 backdrop-blur-md rounded-2xl p-5 border border-neon-green/10 flex items-center justify-between animate-fade-in-up" style="opacity: 0; animation-delay: 0.1s;">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-zinc-800 rounded-xl flex items-center justify-center">
          <ion-icon name="link-outline" class="text-lg text-neon-green"></ion-icon>
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] font-black uppercase tracking-widest text-white">LibreLinkUp (Abbott)</span>
          <span class="text-[9px] font-black uppercase tracking-wider" [ngClass]="isAbbottConnected ? 'text-neon-green' : 'text-zinc-500'">
            {{ isAbbottConnected ? 'Conectado' : 'Desconectado' }}
          </span>
        </div>
      </div>
      
      <!-- Custom Toggle Neón -->
      <button (click)="toggleAbbott()" class="w-12 h-6 rounded-full relative transition-colors duration-300" [ngClass]="isAbbottConnected ? 'bg-neon-green shadow-neon' : 'bg-zinc-800 border border-zinc-700'">
        <div class="absolute top-1 w-4 h-4 rounded-full transition-transform duration-300" 
             [ngClass]="isAbbottConnected ? 'bg-black translate-x-7' : 'bg-zinc-500 translate-x-1'"></div>
      </button>
    </div>

    <!-- Metas de Glucosa -->
    <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-0 mt-2">Rango Objetivo de Glucosa</h3>
    <div class="bg-zinc-900/60 backdrop-blur-md rounded-2xl p-5 border border-neon-green/10 animate-fade-in-up" style="opacity: 0; animation-delay: 0.2s;">
      
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <div class="flex items-center gap-2 text-zinc-500">
            <ion-icon name="settings-outline" class="text-sm"></ion-icon>
            <span class="text-[9px] font-black uppercase tracking-wider">Mínimo (mg/dL)</span>
          </div>
          <input type="number" [(ngModel)]="glucoseMin" class="bg-transparent text-3xl font-black text-white italic border-b border-zinc-800 focus:border-neon-green outline-none w-full text-center py-2" />
        </div>
        <div class="space-y-2">
          <div class="flex items-center gap-2 text-zinc-500">
            <ion-icon name="settings-outline" class="text-sm"></ion-icon>
            <span class="text-[9px] font-black uppercase tracking-wider">Máximo (mg/dL)</span>
          </div>
          <input type="number" [(ngModel)]="glucoseMax" class="bg-transparent text-3xl font-black text-white italic border-b border-zinc-800 focus:border-neon-green outline-none w-full text-center py-2" />
        </div>
      </div>

    </div>

    <!-- Cerrar Sesión -->
    <div class="pt-6 pb-6 animate-fade-in-up" style="opacity: 0; animation-delay: 0.3s;">
      <button (click)="logout()" class="w-full h-16 bg-transparent border border-red-500/30 text-red-500 rounded-2xl flex items-center justify-center gap-3 font-black uppercase tracking-widest hover:bg-red-500/10 active:scale-95 transition-all shadow-[0_0_15px_rgba(239,68,68,0.1)]">
        <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
        Cerrar Sesión
      </button>
    </div>

  </div>

</ion-content>
