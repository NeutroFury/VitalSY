<div class="min-h-svh flex flex-col p-6 bg-[#050505]">
  <div class="w-full max-w-sm mx-auto space-y-8 animate-fade-in-up pb-10">
    
    <!-- Header -->
    <div class="flex items-center gap-4 pt-4">
      <button (click)="goBack()" class="w-12 h-12 rounded-2xl bg-zinc-900 flex items-center justify-center border border-zinc-800 text-white active:scale-90 transition-transform">
        <ion-icon name="chevron-back-outline" class="text-xl"></ion-icon>
      </button>
      <h2 class="text-2xl font-black text-white uppercase italic tracking-tighter m-0">Crear <span class="text-neon-green">Cuenta</span></h2>
    </div>

    <!-- Logo placeholder or icon -->
    <div class="flex justify-center py-2">
      <div class="w-16 h-16 bg-neon-green/10 rounded-[2rem] flex items-center justify-center border border-neon-green/20">
        <ion-icon name="person-add-outline" class="text-3xl text-neon-green"></ion-icon>
      </div>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onRegister()" #registerForm="ngForm" class="space-y-4">
      
      <div class="grid grid-cols-1 gap-4">
        <!-- Input Nombre -->
        <div class="flex flex-col gap-1.5">
          <label class="text-zinc-500 text-[10px] ml-1 uppercase font-bold tracking-widest">Nombre Completo</label>
          <input
            type="text"
            name="nombre"
            [(ngModel)]="userData.nombre"
            placeholder="Tu nombre"
            required
            class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white placeholder:text-zinc-700 focus:outline-none focus:border-neon-green transition-all text-sm w-full"
          />
        </div>

        <!-- Input Email -->
        <div class="flex flex-col gap-1.5">
          <label class="text-zinc-500 text-[10px] ml-1 uppercase font-bold tracking-widest">Email</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="userData.email"
            placeholder="correo@ejemplo.com"
            required
            class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white placeholder:text-zinc-700 focus:outline-none focus:border-neon-green transition-all text-sm w-full"
          />
        </div>

        <!-- Input Password -->
        <div class="flex flex-col gap-1.5">
          <label class="text-zinc-500 text-[10px] ml-1 uppercase font-bold tracking-widest">Contraseña</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="userData.password"
            placeholder="••••••••"
            required
            minlength="6"
            class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white placeholder:text-zinc-700 focus:outline-none focus:border-neon-green transition-all text-sm w-full"
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <!-- Fecha Nacimiento -->
          <div class="flex flex-col gap-1.5">
            <label class="text-zinc-500 text-[10px] ml-1 uppercase font-bold tracking-widest">Nacimiento</label>
            <input
              type="date"
              name="fechaNacimiento"
              [(ngModel)]="userData.fechaNacimiento"
              required
              class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-neon-green transition-all text-[12px] w-full"
            />
          </div>
          <!-- Peso -->
          <div class="flex flex-col gap-1.5">
            <label class="text-zinc-500 text-[10px] ml-1 uppercase font-bold tracking-widest">Peso (kg)</label>
            <input
              type="number"
              name="pesoActual"
              [(ngModel)]="userData.pesoActual"
              required
              class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-neon-green transition-all text-sm w-full"
            />
          </div>
        </div>

        <!-- Género -->
        <div class="flex flex-col gap-1.5">
          <label class="text-zinc-500 text-[10px] ml-1 uppercase font-bold tracking-widest">Género</label>
          <select 
            name="genero" 
            [(ngModel)]="userData.genero"
            class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-neon-green transition-all text-sm w-full appearance-none"
          >
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
      </div>

      <!-- Botón Principal -->
      <button 
        type="submit" 
        [disabled]="!registerForm.valid"
        class="w-full h-16 text-base font-black bg-neon-green text-black uppercase tracking-wider rounded-2xl hover:opacity-90 active:scale-95 transition-all neon-glow mt-4 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Registrarse
      </button>

      <div class="text-center pt-2">
        <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">
          ¿Ya tienes una cuenta? 
          <span (click)="goBack()" class="text-neon-green cursor-pointer hover:underline">Inicia Sesión</span>
        </p>
      </div>
    </form>
  </div>
</div>
