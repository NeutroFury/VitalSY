<ion-content [fullscreen]="true" class="bg-black">
  <div class="px-6 py-8 flex flex-col gap-6 min-h-full animate-fade-in pb-24">
    
    <app-header [showBack]="true" [showGreeting]="false" title="Registro"></app-header>
    
    <!-- TARJETA NIVEL DE GLUCOSA -->
    <div class="bg-[#0c0c0c] rounded-[32px] p-6 border border-zinc-900 relative overflow-hidden">
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-neon-green/10 rounded-xl flex items-center justify-center border border-neon-green/20">
            <ion-icon name="water-outline" class="text-xl text-neon-green"></ion-icon>
          </div>
          <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500">Nivel de Glucosa</h3>
        </div>
        <button class="px-3 py-1.5 border border-neon-green/40 rounded-full flex items-center gap-2 active:scale-95 transition-all">
          <div class="w-2 h-2 rounded-full bg-neon-green animate-pulse"></div>
          <span class="text-[9px] font-black text-neon-green uppercase tracking-widest">Usar Sensor</span>
        </button>
      </div>

      <div class="flex items-end justify-between">
        <input 
          type="number" 
          [(ngModel)]="glucose"
          placeholder="000"
          class="bg-transparent text-7xl font-black italic text-white placeholder:text-zinc-900 w-1/2 outline-none"
        />
        <span class="text-neon-green font-black italic text-2xl uppercase tracking-tighter mb-2">MG/DL</span>
      </div>
    </div>

    <!-- TARJETA CARBOHIDRATOS -->
    <div class="bg-[#0c0c0c] rounded-[32px] p-6 border border-zinc-900">
      <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800">
          <ion-icon name="nutrition-outline" class="text-xl text-zinc-600"></ion-icon>
        </div>
        <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500">Carbohidratos</h3>
      </div>

      <div class="flex items-end justify-between">
        <input 
          type="number" 
          [(ngModel)]="carbs"
          placeholder="0.0"
          class="bg-transparent text-7xl font-black italic text-white placeholder:text-zinc-900 w-1/2 outline-none"
        />
        <span class="text-zinc-800 font-black italic text-3xl uppercase tracking-tighter mb-2">G</span>
      </div>
    </div>

    <!-- SELECTORES DE FECHA Y HORA (Layout Horizontal) -->
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 ml-1">Fecha</label>
        <div class="bg-[#111111] rounded-2xl p-4 border border-zinc-900">
          <input type="date" class="bg-transparent text-white font-black text-xs w-full outline-none uppercase" />
        </div>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 ml-1">Hora</label>
        <div class="bg-[#111111] rounded-2xl p-4 border border-zinc-900">
          <input type="time" class="bg-transparent text-white font-black text-xs w-full outline-none" />
        </div>
      </div>
    </div>
    
    <!-- MOMENTO DEL REGISTRO -->
    <div class="flex flex-col gap-4 mt-2">
      <div class="flex items-center justify-between px-1">
        <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500">Momento del Registro</h3>
        <span class="text-[8px] font-black text-neon-green uppercase tracking-widest border border-neon-green/20 px-2 py-0.5 rounded">Recomendado</span>
      </div>
      
      <div class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide snap-x">
        @for (label of moments; track label) {
          <button 
            (click)="selectMoment(label)"
            [ngClass]="{
              'bg-neon-green text-black font-black shadow-neon': selectedMoment === label,
              'bg-[#0c0c0c] text-zinc-600 border-zinc-900 font-bold': selectedMoment !== label
            }"
            class="px-6 py-4 rounded-2xl text-[10px] uppercase tracking-[0.15em] transition-all whitespace-nowrap snap-start border min-w-[120px]"
          >
            {{ label }}
          </button>
        }
      </div>
    </div>

    <!-- NOTAS ADICIONALES -->
    <div class="flex flex-col gap-3">
      <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500 ml-1">Notas Adicionales (Opcional)</h3>
      <textarea 
        [(ngModel)]="notes"
        placeholder="Ej: Sentí un poco de mareo antes de medir, o comida fuera de lo habitual..."
        class="w-full bg-[#0c0c0c] border border-zinc-900 rounded-[28px] p-6 text-sm text-zinc-400 italic placeholder:text-zinc-800 outline-none min-h-[140px] resize-none focus:border-zinc-700 transition-colors"
      ></textarea>
    </div>

    <!-- BOTÓN FINAL -->
    <button 
      (click)="saveRecord()"
      class="w-full bg-neon-green text-black font-black text-base uppercase tracking-[0.25em] py-6 rounded-[24px] mt-4 active:scale-95 transition-all shadow-neon"
    >
      Guardar Registro
    </button>

  </div>
</ion-content>
